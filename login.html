<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دخول | OMAR BRO HOST</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Tajawal', sans-serif;
            background: linear-gradient(135deg, #0a0f1f 0%, #0a1428 50%, #0a0a1a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            overflow-x: hidden;
            padding: 20px;
            position: relative;
        }
        
        /* خلفية متحركة */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
        }
        .bg-animation .circle {
            position: absolute;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(0,212,255,0.1) 0%, rgba(0,212,255,0) 70%);
            animation: float 20s infinite ease-in-out;
        }
        .bg-animation .circle:nth-child(1) { width: 300px; height: 300px; top: -100px; left: -100px; animation-duration: 25s; }
        .bg-animation .circle:nth-child(2) { width: 500px; height: 500px; bottom: -200px; right: -200px; animation-duration: 30s; }
        .bg-animation .circle:nth-child(3) { width: 200px; height: 200px; top: 50%; left: 50%; animation-duration: 20s; }
        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); opacity: 0.3; }
            50% { transform: translate(30px, -30px) scale(1.2); opacity: 0.5; }
        }
        
        .login-container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 480px;
        }
        .login-card {
            background: rgba(10, 20, 35, 0.85);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 212, 255, 0.3);
            border-radius: 30px;
            padding: 45px 40px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(0, 212, 255, 0.1);
            transition: all 0.3s ease;
        }
        .login-card:hover {
            border-color: rgba(0, 212, 255, 0.6);
            box-shadow: 0 30px 60px rgba(0, 212, 255, 0.15);
        }
        
        .logo-section {
            text-align: center;
            margin-bottom: 35px;
        }
        .logo-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #00d4ff, #0066ff);
            border-radius: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 42px;
            box-shadow: 0 10px 30px rgba(0, 212, 255, 0.3);
            animation: glow 2s infinite;
        }
        @keyframes glow {
            0%, 100% { box-shadow: 0 10px 30px rgba(0, 212, 255, 0.3); }
            50% { box-shadow: 0 15px 40px rgba(0, 212, 255, 0.6); }
        }
        .logo-name {
            font-size: 28px;
            font-weight: 900;
            background: linear-gradient(135deg, #fff, #00d4ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 1px;
        }
        .logo-sub {
            font-size: 12px;
            color: #8899aa;
            margin-top: 8px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        .form-group input {
            width: 100%;
            padding: 16px 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(0, 212, 255, 0.2);
            border-radius: 16px;
            color: #fff;
            font-size: 15px;
            outline: none;
            transition: all 0.3s;
            font-family: 'Tajawal', sans-serif;
        }
        .form-group input:focus {
            border-color: #00d4ff;
            background: rgba(0, 212, 255, 0.1);
            transform: translateY(-2px);
        }
        .form-group input::placeholder {
            color: #556677;
        }
        
        .btn-login {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #00d4ff, #0066ff);
            border: none;
            border-radius: 16px;
            color: #fff;
            font-weight: 900;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
            font-family: 'Tajawal', sans-serif;
            letter-spacing: 1px;
        }
        .btn-login:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(0, 212, 255, 0.4);
        }
        
        .error-msg {
            display: none;
            background: rgba(255, 68, 68, 0.15);
            border: 1px solid #ff4444;
            color: #ff8888;
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-size: 13px;
            text-align: center;
        }
        
        .register-link {
            text-align: center;
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid rgba(0, 212, 255, 0.2);
        }
        .register-link a {
            color: #00d4ff;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .register-link a:hover {
            text-decoration: underline;
            letter-spacing: 0.5px;
        }
        
        #registerForm {
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid rgba(0, 212, 255, 0.2);
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .register-title {
            color: #00d4ff;
            font-size: 18px;
            font-weight: 800;
            margin-bottom: 20px;
            text-align: center;
        }
        .btn-register {
            background: linear-gradient(135deg, #00ff88, #00aa55);
        }
        .btn-cancel {
            background: rgba(255, 68, 68, 0.2);
            margin-top: 10px;
            color: #ff8888;
        }
        .btn-cancel:hover {
            background: rgba(255, 68, 68, 0.3);
            box-shadow: 0 10px 25px rgba(255, 68, 68, 0.2);
        }
        
        .footer {
            text-align: center;
            margin-top: 30px;
            font-size: 12px;
            color: #556677;
        }
        
        @media (max-width: 600px) {
            .login-card { padding: 35px 25px; margin: 10px; }
            .logo-name { font-size: 24px; }
        }
    </style>
</head>
<body>
    <div class="bg-animation">
        <div class="circle"></div>
        <div class="circle"></div>
        <div class="circle"></div>
    </div>
    
    <div class="login-container">
        <div class="login-card">
            <div class="logo-section">
                <div class="logo-icon">🚀</div>
                <div class="logo-name">OMAR BRO HOST</div>
                <div class="logo-sub">استضافة احترافية | تشغيل مستمر 24/7</div>
            </div>

            <div class="error-msg" id="errorMsg"></div>

            <!-- نموذج تسجيل الدخول -->
            <form id="loginForm">
                <div class="form-group">
                    <input type="text" id="username" placeholder="👤 اسم المستخدم" required>
                </div>
                <div class="form-group">
                    <input type="password" id="password" placeholder="🔒 كلمة المرور" required>
                </div>
                <button type="submit" class="btn-login">✨ دخول</button>
            </form>

            <div class="register-link">
                <a onclick="showRegister()">➕ إنشاء حساب جديد</a>
            </div>

            <!-- نموذج إنشاء حساب -->
            <div id="registerForm" style="display: none;">
                <div class="register-title">✨ إنشاء حساب جديد</div>
                <div class="form-group">
                    <input type="text" id="regUsername" placeholder="👤 اسم المستخدم">
                </div>
                <div class="form-group">
                    <input type="password" id="regPassword" placeholder="🔒 كلمة المرور">
                </div>
                <div class="form-group">
                    <input type="password" id="regConfirmPassword" placeholder="✓ تأكيد كلمة المرور">
                </div>
                <button class="btn-login btn-register" onclick="registerUser()">✅ إنشاء الحساب</button>
                <button class="btn-login btn-cancel" onclick="hideRegister()">✖ إلغاء</button>
            </div>

            <div class="footer">
                <span>© 2026 OMAR BRO HOST</span> | <span>استضافة سريعة وآمنة</span>
            </div>
        </div>
    </div>

    <script>
        // تسجيل الدخول
        document.getElementById('loginForm').onsubmit = async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMsg');

            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({username, password})
                });
                const data = await res.json();
                if (data.success) {
                    window.location.href = data.redirect;
                } else {
                    errorMsg.style.display = 'block';
                    errorMsg.textContent = '❌ ' + data.message;
                    setTimeout(() => errorMsg.style.display = 'none', 3000);
                }
            } catch (err) {
                errorMsg.style.display = 'block';
                errorMsg.textContent = '❌ خطأ في الاتصال بالخادم';
                setTimeout(() => errorMsg.style.display = 'none', 3000);
            }
        };

        function showRegister() {
            document.getElementById('registerForm').style.display = 'block';
        }

        function hideRegister() {
            document.getElementById('registerForm').style.display = 'none';
            document.getElementById('regUsername').value = '';
            document.getElementById('regPassword').value = '';
            document.getElementById('regConfirmPassword').value = '';
        }

        async function registerUser() {
            const username = document.getElementById('regUsername').value.trim();
            const password = document.getElementById('regPassword').value;
            const confirm = document.getElementById('regConfirmPassword').value;
            const errorMsg = document.getElementById('errorMsg');
            
            if (!username || !password) {
                errorMsg.style.display = 'block';
                errorMsg.textContent = '❌ الرجاء إدخال جميع البيانات';
                setTimeout(() => errorMsg.style.display = 'none', 3000);
                return;
            }
            
            if (password !== confirm) {
                errorMsg.style.display = 'block';
                errorMsg.textContent = '❌ كلمة المرور غير متطابقة';
                setTimeout(() => errorMsg.style.display = 'none', 3000);
                return;
            }
            
            if (password.length < 4) {
                errorMsg.style.display = 'block';
                errorMsg.textContent = '❌ كلمة المرور يجب أن تكون 4 أحرف على الأقل';
                setTimeout(() => errorMsg.style.display = 'none', 3000);
                return;
            }
            
            try {
                const res = await fetch('/api/register', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({username, password})
                });
                const data = await res.json();
                
                if (data.success) {
                    errorMsg.style.display = 'block';
                    errorMsg.style.background = 'rgba(0,255,136,0.15)';
                    errorMsg.style.borderColor = '#00ff88';
                    errorMsg.style.color = '#88ff88';
                    errorMsg.textContent = '✅ ' + data.message + ' | يمكنك الآن تسجيل الدخول';
                    hideRegister();
                    setTimeout(() => {
                        errorMsg.style.display = 'none';
                        errorMsg.style.background = '';
                        errorMsg.style.borderColor = '';
                        errorMsg.style.color = '';
                    }, 4000);
                } else {
                    errorMsg.style.display = 'block';
                    errorMsg.textContent = '❌ ' + data.message;
                    setTimeout(() => errorMsg.style.display = 'none', 3000);
                }
            } catch(err) {
                errorMsg.style.display = 'block';
                errorMsg.textContent = '❌ خطأ في الاتصال بالخادم';
                setTimeout(() => errorMsg.style.display = 'none', 3000);
            }
        }
    </script>
</body>
</html>
